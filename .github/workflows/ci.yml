name: CI SafeZone

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------- FRONTEND (React + Leaflet) ----------
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build de production
        run: npm run build

  # ---------- BACKEND (Node.js / Express) ----------
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test -- --passWithNoTests

  # ---------- PYTHON (FastAPI + RandomForest) ----------
  python-model:
    name: Modèle Python (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/scripts
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scripts/requirements.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lancer les tests
        run: pytest -v --junitxml=results.xml || true

      - name: Vérifier que l'API démarre
        run: |
          timeout 10 uvicorn api_prediction:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/docs || echo "⚠️ L'API n'a pas répondu, vérifier le point d'entrée (api_prediction:app)"
